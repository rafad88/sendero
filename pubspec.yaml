name: sendero
description: Offline-first trail tracking and route discovery app.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State management ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ─────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Local database ─────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Backend / Auth ─────────────────────────────────────────
  supabase_flutter: ^2.5.3

  # ── Maps ───────────────────────────────────────────────────
  maplibre_gl: ^0.20.0

  # ── GPS / Location ─────────────────────────────────────────
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  background_fetch: ^1.2.2

  # ── Connectivity ───────────────────────────────────────────
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.0

  # ── GPX / file handling ────────────────────────────────────
  gpx: ^2.2.0
  file_picker: ^8.0.3
  share_plus: ^12.0.2

  # ── Image handling ─────────────────────────────────────────
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.3.1

  # ── Utilities ──────────────────────────────────────────────
  uuid: ^4.4.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  intl: ^0.19.0

  # ── UI ─────────────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/map_styles/
    - assets/images/
